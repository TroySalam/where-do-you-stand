<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where Do You Stand?</title>
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=cabinet-grotesk@700,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./base.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app">
    <!-- INTRO -->
    <section id="intro" class="screen active">
      <div class="intro-content">
        <div class="logo-mark">
          <svg viewBox="0 0 48 48" width="56" height="56" fill="none" aria-label="Compass icon">
            <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="2"/>
            <line x1="24" y1="4" x2="24" y2="44" stroke="currentColor" stroke-width="1" opacity="0.3"/>
            <line x1="4" y1="24" x2="44" y2="24" stroke="currentColor" stroke-width="1" opacity="0.3"/>
            <circle cx="24" cy="24" r="3" fill="currentColor"/>
            <polygon points="24,8 26,20 24,22 22,20" fill="var(--color-primary)"/>
            <polygon points="24,40 22,28 24,26 26,28" fill="var(--color-text-muted)" opacity="0.5"/>
          </svg>
        </div>
        <h1>Where Do You Stand?</h1>
        <p class="subtitle">20 questions about real stuff that matters to you. No wrong answers — just honest ones.</p>
        <div class="intro-details">
          <span class="tag">~3 min</span>
          <span class="tag">20 questions</span>
          <span class="tag">anonymous</span>
        </div>
        <button class="btn-primary" onclick="startQuiz()">Let's Go</button>
      </div>
    </section>

    <!-- QUIZ -->
    <section id="quiz" class="screen">
      <div class="quiz-container">
        <div class="quiz-header">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="progress-text" id="progressText">1 / 20</span>
        </div>
        <div class="question-area">
          <p class="topic-tag" id="topicTag"></p>
          <h2 class="question-text" id="questionText"></h2>
          <div class="options" id="optionsContainer"></div>
        </div>
      </div>
    </section>

    <!-- RESULT -->
    <section id="result" class="screen">
      <div class="result-container">
        <h2 class="result-title">Your Compass</h2>
        <div class="compass-wrapper">
          <canvas id="compassCanvas" width="400" height="400"></canvas>
          <div class="axis-labels">
            <span class="axis-label top">More Government</span>
            <span class="axis-label bottom">Less Government</span>
            <span class="axis-label left">Progressive</span>
            <span class="axis-label right">Traditional</span>
          </div>
        </div>
        <p class="result-summary" id="resultSummary"></p>
        <div class="topic-scores" id="topicScores"></div>
        <button class="btn-secondary" onclick="resetQuiz()">Take Again</button>
      </div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
